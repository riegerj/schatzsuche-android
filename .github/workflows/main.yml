name: Android APK Generator

on:
  push:
    branches: [ "main", "master" ] # Startet den Build, sobald Sie Code hochladen
  workflow_dispatch: # Erlaubt es Ihnen, den Build jederzeit per Knopfdruck manuell zu starten

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Code auschecken
      uses: actions/checkout@v4

    - name: Java JDK 17 einrichten
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle' # Beschleunigt zukünftige Builds extrem, da Plugins zwischengespeichert werden

    - name: Build-Skript Rechte erteilen
      run: chmod +x gradlew

    - name: APK generieren (Debug)
      run: ./gradlew assembleDebug

    - name: APK als Download bereitstellen
      uses: actions/upload-artifact@v4
      with:
        name: MeineFertigeApp
        path: app/build/outputs/apk/debug/app-debug.apk
